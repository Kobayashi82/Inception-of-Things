apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: web-app
    namespace: argocd
spec:
    project: default
    source:
        repoURL: http://gitlab-webservice-default.gitlab.svc.cluster.local:8181/__GITLAB_USER__/__GITLAB_REPO__.git
        targetRevision: HEAD
        path: .
    destination:
        server: https://kubernetes.default.svc
        namespace: dev
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
