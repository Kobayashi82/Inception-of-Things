apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: web-app
    namespace: dev
    annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
    ingressClassName: traefik
    rules:
        - host: web-app.local
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: web-app
                            port:
                                number: 80
