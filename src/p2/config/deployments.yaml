apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  labels:
    app: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: app1
          image: kobayashi82/iot-web-app:1.0.0
          ports:
            - containerPort: 80
          env:
            - name: APP_NAME
              value: "app1"

